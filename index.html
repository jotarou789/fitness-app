<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>筋トレログ</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-black text-white min-h-screen p-4"><div class="max-w-md mx-auto bg-zinc-900 rounded-3xl p-4 space-y-4"><h1 class="text-2xl font-bold text-center">筋トレログ</h1><div id="app"></div></div><script>
const app=document.getElementById('app');let gender='male',part='',day='',img='',records=JSON.parse(localStorage.getItem('records')||'{}');const ex={male:{胸:[['ベンチプレス','胸全体を押し上げる'],['ダンベルフライ','胸を広げる']],脚:[['スクワット','下半身全体']],背中:[['ラットプルダウン','広背筋']],肩:[['サイドレイズ','三角筋']],三頭筋:[['プレスダウン','腕裏']],二頭筋:[['アームカール','腕前']]},female:{お尻:[['ヒップスラスト','お尻メイン']],脚:[['スクワット','脚全体']],お腹:[['クランチ','腹筋']],背中:[['ラットプルダウン','背中']],肩:[['サイドレイズ','肩']]}};
function render(){const parts=Object.keys(ex[gender]);const last=Object.values(records).slice(-1)[0]||{}; app.innerHTML=`<div class='space-y-4'><div class='flex gap-2 justify-center'><button onclick="gender='male';render()" class='px-3 py-2 bg-blue-600 rounded-xl'>男性</button><button onclick="gender='female';render()" class='px-3 py-2 bg-pink-600 rounded-xl'>女性</button></div><div class='bg-zinc-800 p-4 rounded-2xl'><h2 class='font-bold mb-2'>理想の体</h2><input type='file' accept='image/*' onchange='upload(event)' class='text-sm'>${img?`<img src='${img}' class='mt-2 rounded-xl w-full'>`:''}</div><div class='bg-zinc-800 p-4 rounded-2xl'><h2 class='font-bold mb-2'>おすすめメニュー</h2><div class='flex flex-wrap gap-2'>${parts.map(p=>`<button onclick="part='${p}';render()" class='px-2 py-1 bg-zinc-700 rounded'>${p}</button>`).join('')}</div>${part?`<div class='mt-2 space-y-2'>${ex[gender][part].map(v=>`<div class='bg-zinc-700 p-2 rounded'><div>${v[0]}</div><div class='text-xs text-zinc-300'>${v[1]}</div></div>`).join('')}</div>`:''}</div><div class='bg-zinc-800 p-4 rounded-2xl'><h2 class='font-bold mb-2'>記録</h2><div class='grid grid-cols-5 gap-1'>${Array.from({length:30},(_,i)=>i+1).map(d=>`<button onclick="day=${d};render()" class='p-2 text-xs rounded ${records[d]?'bg-green-500':'bg-zinc-700'}'>${d}</button>`).join('')}</div>${day?`<div class='mt-2 space-y-2'><input id='menu' placeholder='トレ内容' class='w-full p-2 text-black rounded'><input id='weight' placeholder='重量kg' class='w-full p-2 text-black rounded'><button onclick='save()' class='w-full bg-green-600 p-2 rounded'>保存</button></div>`:''}${last.weight?`<div class='mt-3 text-sm'>前回重量: ${last.weight}kg</div>`:''}</div><div class='bg-zinc-800 p-4 rounded-2xl'><h2 class='font-bold mb-2'>重量経過</h2><div class='text-sm text-zinc-300'>保存した重量一覧</div><div>${Object.entries(records).map(([d,v])=>v.weight?`<div>${d}日: ${v.weight}kg</div>`:'').join('')}</div></div></div>`}
function save(){records[day]={menu:document.getElementById('menu').value,weight:document.getElementById('weight').value};localStorage.setItem('records',JSON.stringify(records));render()}
function upload(e){const f=e.target.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{img=r.result; render()}; r.readAsDataURL(f)}
render();
</script></body></html>
