<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>筋トレログ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white min-h-screen p-4 flex justify-center">
  <div class="w-full max-w-md bg-zinc-900 rounded-3xl p-4 space-y-4">
    <h1 class="text-2xl font-bold text-center">筋トレログ</h1>
    <div id="app"></div>
  </div>

  <script>
    const app = document.getElementById('app');
    let gender = 'male';
    let selectedPart = '';
    let selectedDay = null;
    let records = JSON.parse(localStorage.getItem('gym-records') || '{}');

    const exercises = {
      male: { '胸':['ベンチプレス','ダンベルフライ','チェストプレス'], '脚':['スクワット','レッグプレス'], '背中':['懸垂','ラットプルダウン'], '肩':['ショルダープレス'], '三頭筋':['プレスダウン'], '二頭筋':['アームカール'] },
      female: { 'お尻':['ヒップスラスト','グルートブリッジ'], '脚':['スクワット'], 'お腹':['プランク','クランチ'], '背中':['ラットプルダウン'], '肩':['サイドレイズ'] }
    };

    function render() {
      const parts = Object.keys(exercises[gender]);
      app.innerHTML = `
        <div class="space-y-4">
          <div class="flex gap-2 justify-center">
            <button onclick="setGender('male')" class="px-3 py-2 bg-blue-600 rounded-xl">男性</button>
            <button onclick="setGender('female')" class="px-3 py-2 bg-pink-600 rounded-xl">女性</button>
          </div>
          <div class="bg-zinc-800 p-4 rounded-2xl">
            <h2 class="font-bold mb-2">おすすめメニュー</h2>
            <div class="flex flex-wrap gap-2">${parts.map(p=>`<button onclick="selectPart('${p}')" class="px-2 py-1 bg-zinc-700 rounded-lg text-sm">${p}</button>`).join('')}</div>
            ${selectedPart ? `<div class='mt-3 space-y-2'>${exercises[gender][selectedPart].map(e=>`<div class='p-2 bg-zinc-700 rounded-lg text-sm'>${e}</div>`).join('')}</div>`:''}
          </div>
          <div class="bg-zinc-800 p-4 rounded-2xl">
            <h2 class="font-bold mb-2">記録</h2>
            <div class="grid grid-cols-5 gap-1">${Array.from({length:30},(_,i)=>i+1).map(d=>`<button onclick="selectDay(${d})" class="p-2 text-xs rounded ${records[d]?'bg-green-500':'bg-zinc-700'}">${d}</button>`).join('')}</div>
            ${selectedDay ? `<div class='mt-3'><input id='memo' class='w-full p-2 text-black rounded' placeholder='トレ内容' /><button onclick='saveRecord()' class='mt-2 w-full bg-green-600 p-2 rounded-xl'>保存</button></div>`:''}
          </div>
        </div>`;
    }

    window.setGender = (g)=>{ gender=g; selectedPart=''; render(); };
    window.selectPart = (p)=>{ selectedPart=p; render(); };
    window.selectDay = (d)=>{ selectedDay=d; render(); };
    window.saveRecord = ()=>{ const val=document.getElementById('memo').value; records[selectedDay]=val; localStorage.setItem('gym-records', JSON.stringify(records)); render(); };
    render();
  </script>
</body>
</html>
