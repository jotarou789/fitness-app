<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>筋トレログ 完全版</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-black text-white min-h-screen p-3">
<div class="max-w-md mx-auto bg-zinc-900 rounded-[2rem] p-4 space-y-4 shadow-2xl">
<h1 class="text-3xl font-bold text-center">筋トレログ</h1>
<div id="app"></div>
</div>

<script>
const app = document.getElementById('app');

let gender = 'male';
let selectedPart = '';
let selectedExercise = null;
let selectedDay = null;
let month = 5;
let idealPhoto = localStorage.getItem('ideal-photo') || '';
let searchPart = '';

let records = JSON.parse(localStorage.getItem('gym-records') || '{}');

const exerciseData = {
  male: {
    胸: [
      ['ベンチプレス','胸全体を鍛える','https://www.youtube.com/results?search_query=ベンチプレス'],
      ['ダンベルフライ','胸を広げる','https://www.youtube.com/results?search_query=ダンベルフライ'],
      ['チェストプレス','マシン胸トレ','https://www.youtube.com/results?search_query=チェストプレス'],
      ['インクラインベンチ','上部胸','https://www.youtube.com/results?search_query=インクラインベンチプレス'],
      ['ペックフライ','胸を閉じる','https://www.youtube.com/results?search_query=ペックフライ']
    ],
    脚: [
      ['スクワット','下半身全体','https://www.youtube.com/results?search_query=スクワット'],
      ['レッグプレス','脚を押し出す','https://www.youtube.com/results?search_query=レッグプレス'],
      ['ブルガリアンスクワット','片足種目','https://www.youtube.com/results?search_query=ブルガリアンスクワット'],
      ['レッグカール','もも裏','https://www.youtube.com/results?search_query=レッグカール'],
      ['カーフレイズ','ふくらはぎ','https://www.youtube.com/results?search_query=カーフレイズ']
    ],
    背中: [
      ['懸垂','背中を引く','https://www.youtube.com/results?search_query=懸垂'],
      ['ラットプルダウン','広背筋','https://www.youtube.com/results?search_query=ラットプルダウン'],
      ['デッドリフト','全身高重量','https://www.youtube.com/results?search_query=デッドリフト'],
      ['シーテッドロー','背中中央','https://www.youtube.com/results?search_query=シーテッドロー'],
      ['ベントオーバーロウ','厚み作り','https://www.youtube.com/results?search_query=ベントオーバーロウ']
    ],
    肩: [
      ['ショルダープレス','肩全体','https://www.youtube.com/results?search_query=ショルダープレス'],
      ['サイドレイズ','肩横','https://www.youtube.com/results?search_query=サイドレイズ'],
      ['リアレイズ','肩後ろ','https://www.youtube.com/results?search_query=リアレイズ']
    ],
    三頭筋: [
      ['プレスダウン','腕裏','https://www.youtube.com/results?search_query=プレスダウン'],
      ['ディップス','自重三頭','https://www.youtube.com/results?search_query=ディップス'],
      ['フレンチプレス','頭上から下ろす','https://www.youtube.com/results?search_query=フレンチプレス']
    ],
    二頭筋: [
      ['アームカール','腕前','https://www.youtube.com/results?search_query=アームカール'],
      ['ハンマーカール','前腕も使う','https://www.youtube.com/results?search_query=ハンマーカール'],
      ['インクラインカール','伸ばして鍛える','https://www.youtube.com/results?search_query=インクラインカール']
    ]
  },
  female: {
    お尻: [
      ['ヒップスラスト','お尻メイン','https://www.youtube.com/results?search_query=ヒップスラスト'],
      ['グルートブリッジ','お尻を上げる','https://www.youtube.com/results?search_query=グルートブリッジ'],
      ['ドンキーキック','後ろに蹴る','https://www.youtube.com/results?search_query=ドンキーキック'],
      ['ブルガリアンスクワット','お尻脚','https://www.youtube.com/results?search_query=ブルガリアンスクワット'],
      ['サイドウォーク','中臀筋','https://www.youtube.com/results?search_query=サイドウォーク']
    ],
    脚: [
      ['スクワット','脚全体','https://www.youtube.com/results?search_query=スクワット'],
      ['レッグプレス','脚を押す','https://www.youtube.com/results?search_query=レッグプレス'],
      ['カーフレイズ','ふくらはぎ','https://www.youtube.com/results?search_query=カーフレイズ']
    ],
    お腹: [
      ['クランチ','腹筋','https://www.youtube.com/results?search_query=クランチ'],
      ['プランク','体幹','https://www.youtube.com/results?search_query=プランク'],
      ['レッグレイズ','下腹','https://www.youtube.com/results?search_query=レッグレイズ']
    ],
    背中: [
      ['ラットプルダウン','背中','https://www.youtube.com/results?search_query=ラットプルダウン'],
      ['シーテッドロー','引く動作','https://www.youtube.com/results?search_query=シーテッドロー']
    ],
    肩: [
      ['サイドレイズ','肩横','https://www.youtube.com/results?search_query=サイドレイズ'],
      ['ショルダープレス','肩全体','https://www.youtube.com/results?search_query=ショルダープレス']
    ]
  }
};

function saveStorage(){
  localStorage.setItem('gym-records', JSON.stringify(records));
}

function uploadIdeal(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    idealPhoto = reader.result;
    localStorage.setItem('ideal-photo', idealPhoto);
    render();
  }
  reader.readAsDataURL(file);
}

function render(){
  const parts = Object.keys(exerciseData[gender]);
  const chartRecords = Object.entries(records).filter(([k,v])=>v.weight);

  app.innerHTML = `
  <div class='space-y-4'>

    <div class='flex justify-center gap-2'>
      <button onclick="gender='male';render()" class='bg-blue-600 px-4 py-2 rounded-2xl'>男性</button>
      <button onclick="gender='female';render()" class='bg-pink-600 px-4 py-2 rounded-2xl'>女性</button>
    </div>

    <div class='bg-zinc-800 rounded-2xl p-4'>
      <h2 class='font-bold mb-2'>理想の体</h2>
      <input type='file' accept='image/*' onchange='uploadIdeal(event)' class='w-full text-sm'>
      ${idealPhoto ? `<img src='${idealPhoto}' class='mt-3 rounded-2xl w-full object-contain max-h-96 bg-zinc-900'>` : ''}
    </div>

    <div class='bg-zinc-800 rounded-2xl p-4'>
      <h2 class='font-bold mb-2'>おすすめメニュー</h2>
      <div class='flex flex-wrap gap-2 mb-3'>
        ${parts.map(p=>`<button onclick="selectedPart='${p}';selectedExercise=null;render()" class='bg-zinc-700 px-3 py-2 rounded-xl text-sm'>${p}</button>`).join('')}
      </div>

      ${selectedPart ? `
      <div class='space-y-2'>
        ${exerciseData[gender][selectedPart].map(ex=>`
          <button onclick="showExercise('${ex[0]}')" class='w-full text-left bg-zinc-700 rounded-xl p-3'>${ex[0]}</button>
        `).join('')}
      </div>
      ` : ''}

      ${selectedExercise ? `
      <div class='mt-3 bg-zinc-900 rounded-xl p-3 text-sm'>
        <div class='font-bold mb-1'>${selectedExercise[0]}</div>
        <div class='text-zinc-300 mb-2'>${selectedExercise[1]}</div>
        <a href='${selectedExercise[2]}' target='_blank' class='text-blue-400 underline'>動画を見る</a>
      </div>
      ` : ''}
    </div>

    <div class='bg-zinc-800 rounded-2xl p-4'>
      <div class='flex items-center justify-between mb-3'>
        <button onclick='changeMonth(-1)'>←</button>
        <div>${month}月</div>
        <button onclick='changeMonth(1)'>→</button>
      </div>

      <div class='grid grid-cols-5 gap-1'>
        ${Array.from({length:30},(_,i)=>i+1).map(day=>{
          const key = `${month}-${day}`;
          return `<button onclick="openDay(${day})" class='p-2 rounded-lg text-xs ${records[key] ? 'bg-green-500' : 'bg-zinc-700'}'>${day}</button>`
        }).join('')}
      </div>

      ${selectedDay ? `
      <div class='mt-4 space-y-2'>
        <input id='menu' placeholder='トレ内容' value='${records[`${month}-${selectedDay}`]?.menu || ''}' class='w-full p-2 rounded-xl text-black'>
        <textarea id='memo' placeholder='コツ・メモ' class='w-full p-2 rounded-xl text-black min-h-[80px]'>${records[`${month}-${selectedDay}`]?.memo || ''}</textarea>
        <input id='weight' placeholder='重量kg' value='${records[`${month}-${selectedDay}`]?.weight || ''}' class='w-full p-2 rounded-xl text-black'>
        <input id='cardioMin' placeholder='有酸素 何分' value='${records[`${month}-${selectedDay}`]?.cardioMin || ''}' class='w-full p-2 rounded-xl text-black'>
        <input id='cardioKm' placeholder='有酸素 何km' value='${records[`${month}-${selectedDay}`]?.cardioKm || ''}' class='w-full p-2 rounded-xl text-black'>
        <input type='file' accept='image/*' onchange='uploadPhoto(event)'>

        ${records[`${month}-${selectedDay}`]?.photo ? `<img src='${records[`${month}-${selectedDay}`].photo}' class='rounded-2xl w-full h-40 object-cover'>` : ''}

        <button onclick='saveRecord()' class='w-full bg-green-600 rounded-2xl py-2'>保存 / 編集</button>
      </div>
      ` : ''}
    </div>

    <div class='bg-zinc-800 rounded-2xl p-4'>
      <h2 class='font-bold mb-2'>重量成長グラフ</h2>
      <canvas id='chart'></canvas>
    </div>

    <div class='bg-zinc-800 rounded-2xl p-4'>
      <h2 class='font-bold mb-2'>部位別履歴検索</h2>
      <input id='searchInput' value='${searchPart}' onkeyup='updateSearch(this.value)' placeholder='胸' class='w-full p-2 rounded-xl text-black'>

      <div class='mt-3 text-sm space-y-1 max-h-40 overflow-y-auto'>
        ${Object.entries(records)
          .filter(([k,v])=>!searchPart || v.menu?.includes(searchPart))
          .map(([k,v])=>`<div class='bg-zinc-700 rounded-lg p-2'>${k}: ${v.menu || ''} ${v.weight ? `(${v.weight}kg)` : ''}</div>`)
          .join('')}
      </div>
    </div>

  </div>
  `;

  drawChart(chartRecords);
}

function showExercise(name){
  selectedExercise = exerciseData[gender][selectedPart].find(v=>v[0]===name);
  render();
}

function openDay(day){
  selectedDay = day;
  render();
}

function saveRecord(){
  const key = `${month}-${selectedDay}`;

  records[key] = {
    menu: document.getElementById('menu').value,
    memo: document.getElementById('memo').value,
    weight: document.getElementById('weight').value,
    cardioMin: document.getElementById('cardioMin').value,
    cardioKm: document.getElementById('cardioKm').value,
    photo: records[key]?.photo || ''
  };

  saveStorage();
  render();
}

function uploadPhoto(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ()=>{
    const key = `${month}-${selectedDay}`;

    if(!records[key]) records[key] = {};

    records[key].photo = reader.result;
    saveStorage();
    render();
  }

  reader.readAsDataURL(file);
}

function changeMonth(num){
  month += num;
  if(month < 1) month = 12;
  if(month > 12) month = 1;
  render();
}

function drawChart(data){
  const canvas = document.getElementById('chart');
  if(!canvas) return;

  new Chart(canvas, {
    type:'line',
    data:{
      labels:data.map(v=>v[0]),
      datasets:[{
        label:'重量',
        data:data.map(v=>Number(v[1].weight)),
        borderColor:'rgb(34,197,94)',
        tension:0.3
      }]
    },
    options:{
      plugins:{
        legend:{labels:{color:'white'}}
      },
      scales:{
        x:{ticks:{color:'white'}},
        y:{ticks:{color:'white'}}
      }
    }
  })
}

render();

function updateSearch(value){
  searchPart = value;
  render();
}
</script>
</body>
</html>
